apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-metrics-agent
  namespace: monitoring

---
# ClusterRole — grants read access to node metrics and node capacity.
# metrics.k8s.io/nodes  → current CPU/mem usage (from metrics-server)
# core/nodes            → allocatable capacity (to compute percent)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vm-metrics-agent
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm-metrics-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vm-metrics-agent
subjects:
  - kind: ServiceAccount
    name: vm-metrics-agent
    namespace: monitoring
