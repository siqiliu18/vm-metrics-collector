# Grafana provisioning files — replaces the bind mount used in World 1.
# In World 1: ./grafana/provisioning is bind-mounted into the container.
# In World 2: the same files live in a ConfigMap, mounted as a volume.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  # datasources/influxdb.yaml
  influxdb.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB
        uid: influxdb-vm-metrics
        type: influxdb
        access: proxy
        url: http://influxdb.monitoring.svc.cluster.local:8086
        jsonData:
          version: Flux
          organization: vm-metrics
          defaultBucket: metrics
        secureJsonData:
          token: my-super-secret-token

  # dashboards/dashboards.yaml
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards

  # dashboards/vm-metrics.json — same dashboard as World 1
  vm-metrics.json: |
    {
      "title": "VM Metrics",
      "uid": "vm-metrics-dashboard",
      "description": "CPU and memory per VM node — raw (15s) and hourly summaries",
      "tags": ["vm-metrics"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "graphTooltip": 1,
      "editable": true,
      "annotations": { "list": [] },
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "CPU % (raw, 15s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" },
          "targets": [{ "refId": "A", "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" }, "query": "from(bucket: \"metrics\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"vm_metrics\")\n  |> filter(fn: (r) => r._field == \"cpu_pct\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never" } }, "overrides": [] },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 2,
          "title": "Memory % (raw, 15s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" },
          "targets": [{ "refId": "A", "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" }, "query": "from(bucket: \"metrics\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"vm_metrics\")\n  |> filter(fn: (r) => r._field == \"mem_pct\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never" } }, "overrides": [] },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 3,
          "title": "Hourly Summary — CPU avg/min/max/p95",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" },
          "targets": [{ "refId": "A", "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" }, "query": "from(bucket: \"metrics\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"vm_metrics_hourly\")\n  |> filter(fn: (r) => r._field == \"cpu_avg\" or r._field == \"cpu_min\" or r._field == \"cpu_max\" or r._field == \"cpu_p95\")" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 5, "showPoints": "always", "pointSize": 6 } }, "overrides": [] },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 4,
          "title": "Hourly Summary — Memory avg/min/max/p95",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" },
          "targets": [{ "refId": "A", "datasource": { "type": "influxdb", "uid": "influxdb-vm-metrics" }, "query": "from(bucket: \"metrics\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"vm_metrics_hourly\")\n  |> filter(fn: (r) => r._field == \"mem_avg\" or r._field == \"mem_min\" or r._field == \"mem_max\" or r._field == \"mem_p95\")" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 5, "showPoints": "always", "pointSize": 6 } }, "overrides": [] },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } }
        }
      ]
    }
