apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: monitoring
spec:
  serviceName: influxdb
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      initContainers:
        - name: fix-permissions
          image: ghcr.io/siqiliu18/vm-metrics-agent:latest   # alpine-based, on ghcr.io not Docker Hub
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/influxdb2"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
      containers:
        - name: influxdb
          image: ghcr.io/siqiliu18/influxdb:2.7
          ports:
            - containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: "setup"
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: "admin"
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              value: "adminpassword"   # store in a Kubernetes Secret in production
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: "vm-metrics"
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: "metrics"
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              value: "my-super-secret-token"   # same value used by consumer, api, grafana — store in a Secret in production
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
          readinessProbe:
            exec:
              command: ["influx", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: influxdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
